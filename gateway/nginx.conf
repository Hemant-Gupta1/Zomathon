worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;

    # Setting a strict 10ms budget for proxy connect and send timeouts
    proxy_connect_timeout 5ms;
    proxy_send_timeout 5ms;
    proxy_read_timeout 250ms; # Allow sufficient time for the python AI core to process (total 200ms budget)
    
    upstream ai_core {
        server python-ai-core:8080;
    }

    server {
        listen 80;

        location /api/v1/recommend {
            proxy_pass http://ai_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Healthcheck endpoint
        location /health {
            return 200 'healthy\n';
        }
    }
}
